version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: backtask-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 6080
      POSTGRES_DB: BackTask2
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: backtask-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://minio:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: backtask-api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:6080@db:5432/BackTask2
      DATABASE_URL_SYNC: postgresql://postgres:6080@db:5432/BackTask2
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: tasks
      MINIO_SECURE: "False"
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  db_data:
  minio_data:

networks:
  default:
    name: backtask-network
